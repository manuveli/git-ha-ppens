name: Release

on:
  push:
    branches:
      - release

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' custom_components/git_ha_ppens/manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ steps.version.outputs.version }} already exists. Update the version in manifest.json first."
            exit 1
          fi

      - name: Extract release notes from CHANGELOG
        id: release_notes
        uses: ffurrer2/extract-release-notes@v3
        with:
          changelog_file: CHANGELOG.md

      - name: Create zip
        run: |
          cd custom_components/git_ha_ppens
          zip -r ../../git_ha_ppens_${{ steps.version.outputs.version }}.zip .
          zip -r ../../git_ha_ppens.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.release_notes.outputs.release_notes }}
          files: |
            git_ha_ppens_${{ steps.version.outputs.version }}.zip
            git_ha_ppens.zip
